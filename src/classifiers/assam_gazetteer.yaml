# ============================================================================
# Assam District Gazetteer — 35 districts (2011 Census boundaries)
#
# Canonical names follow the 2011 Census of India.
# Census codes use the standard AS-prefixed numbering.
# Aliases include: common alternate spellings, district HQ town names,
# prominent locality names found in tender bid-opening addresses, and
# abbreviations observed in the OCDS Assam dataset.
#
# Note on post-2011 districts:
#   After 2011, five new districts were carved out:
#     Majuli (from Jorhat, 2016), Hojai (from Nagaon, 2015),
#     Biswanath (from Sonitpur, 2015), Charaideo (from Sivasagar, 2015),
#     South Salmara-Mankachar (from Dhubri, 2016),
#     West Karbi Anglong (from Karbi Anglong, 2016),
#     Bajali (from Barpeta, 2020), Tamulpur (from Baksa, 2022).
#   These are included here using ad-hoc census codes (AS028–AS035)
#   since they have no 2011 Census code. The classifier treats them as
#   separate districts — adjust if your Census data uses pre-split boundaries.
# ============================================================================

# --------------------------------------------------------------------------
# state_hq_keywords: addresses containing ONLY these terms (and no district-
# specific alias) are classified as Kamrup Metropolitan, since virtually all
# state-level government offices are physically located in Guwahati.
# --------------------------------------------------------------------------
state_hq_keywords:
  - "Assam"
  - "ASSAM"
  - "NHM"
  - "PWRD"
  - "APDCL"
  - "AEGCL"
  - "APGCL"
  - "GMDA"
  - "APHCL"
  - "AHVD"
  - "AMSCL"
  - "AMTRON"
  - "AEDA"
  - "FREMAA"
  - "ALPCO"
  - "AIWTD"
  - "DoHUA"

# --------------------------------------------------------------------------
# btc_keywords: addresses with these terms (and no more-specific district
# within BTC — Kokrajhar, Chirang, Baksa, Udalguri) default to Kokrajhar,
# which is the BTC capital.
# --------------------------------------------------------------------------
btc_keywords:
  - "BTC"
  - "Bodoland"

# --------------------------------------------------------------------------
# circle_map: PWD / WR circle abbreviations → district
# --------------------------------------------------------------------------
circle_map:
  JRC: "Jorhat"
  NRC: "Nagaon"
  WAC: "Goalpara"
  GRC: "Kamrup Metropolitan"
  Glp: "Goalpara"

